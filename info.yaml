# Tiny Tapeout project information
project:
  title:        "TinyMOA-IHP0P4"
  author:       "Ezra Wolf"
  discord:      "erstfeld"
  description:  "Digital compute-in-memory accelerator core."
  language:     "Verilog"
  clock_hz:     50000000

  # One tile is ~167x108um
  # Largest size is 6 wide for this setup, not 8 like normal. Valid sizes:
  # Valid sizes: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2
  tiles: "6x2"

  # Top module must start with "tt_um_"
  top_module:  "tt_um_tinymoa_ihp0p4"

  # Project files
  source_files:
    - "project.v"
    - "multiply.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: "template"
  ui[1]: ""
  ui[2]: ""
  ui[3]: ""
  ui[4]: ""
  ui[5]: ""
  ui[6]: ""
  ui[7]: ""

  # Outputs
  uo[0]: ""
  uo[1]: ""
  uo[2]: ""
  uo[3]: ""
  uo[4]: ""
  uo[5]: ""
  uo[6]: ""
  uo[7]: ""

  # Bidirectional pins
  uio[0]: ""
  uio[1]: ""
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

# Do not change!
yaml_version: 6
